<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewak Community | Unique Mobile Apps</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #000000; /* Deep Black */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .main-card {
            text-align: center;
            padding: 40px;
            border: 2px solid #D4AF37; /* Metallic Gold */
            border-radius: 30px;
            background: linear-gradient(145deg, #121212, #000000);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            max-width: 500px;
            width: 90%;
        }
        .logo-icon {
            font-size: 60px;
            color: #D4AF37;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        h1 {
            font-size: 32px;
            margin: 0;
            color: #D4AF37;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 18px;
            margin: 15px 0;
            color: #cccccc;
            font-weight: 300;
        }
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
            margin: 25px 0;
        }
        .description {
            font-size: 15px;
            color: #999999;
            line-height: 1.6;
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #D4AF37;
            opacity: 0.7;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="logo-icon">✨</div>
        <h1>SEWAK COMMUNITY</h1>
        <div class="tagline">Crafting Unique Mobile Experiences</div>
        <div class="divider"></div>
        <p class="description">
            Hum banate hain aisi mobile applications jo sabse alag aur unique hain. 
            Quality, Design aur Innovation hamari pehchan hai.
        </p>
        <div class="footer">© 2026 SEWAK COMMUNITY | ALL RIGHTS RESERVED</div>
    </div>
</body>
</html>
