<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewak Community</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            text-align: center;
            padding: 40px 30px;
            border: 1.5px solid #D4AF37;
            border-radius: 24px;
            background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%);
            max-width: 450px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: block;
        }
        h1 {
            font-size: 28px;
            color: #D4AF37;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }
        p.tagline {
            font-size: 18px;
            color: #e2e8f0;
            margin-bottom: 25px;
            font-weight: 500;
        }
        .desc {
            font-size: 15px;
            color: #a1a1aa;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .footer {
            font-size: 13px;
            color: #71717a;
            border-top: 1px solid #27272a;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="icon">✨</span>
        <h1>Sewak Community</h1>
        <p class="tagline">Simply unique apps.</p>
        <p class="desc">
            We focus on building mobile apps that are simple, beautiful, and easy to use. Our goal is to create experiences that feel natural and actually help you in your daily life.
        </p>
        <div class="footer">
            Built with passion by Sewak Community • 2026
        </div>
    </div>
</body>
</html>
